<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🦙 LLaMA Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #16162a;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header .title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header .title h1 {
      font-size: 1.2rem;
      color: #fff;
      font-weight: 700;
    }
    .chat-header .title span {
      font-size: 1.6rem;
    }
    .chat-header .subtitle {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.75);
    }
    .header-badge {
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #6366f155; border-radius: 10px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeSlide 0.25s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot   { align-self: flex-start; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .message.user .avatar  { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
    .message.bot  .avatar  { background: linear-gradient(135deg,#10b981,#059669); }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.6;
      word-break: break-word;
    }
    .message.user .bubble {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: #1e1e35;
      color: #e2e2f0;
      border: 1px solid #2d2d50;
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      padding: 14px 18px;
    }
    .typing-dots { display: flex; gap: 5px; align-items: center; }
    .typing-dots span {
      width: 8px; height: 8px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-8px); }
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      color: #555577;
      margin: auto;
      padding: 40px 20px;
    }
    .welcome .icon { font-size: 3.5rem; margin-bottom: 12px; }
    .welcome h2 { color: #8888aa; font-size: 1.1rem; margin-bottom: 6px; }
    .welcome p  { font-size: 0.85rem; }

    /* ── Input area ── */
    .chat-input-area {
      padding: 16px 20px;
      background: #16162a;
      border-top: 1px solid #2d2d50;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: #1e1e35;
      border: 1px solid #2d2d50;
      border-radius: 14px;
      color: #e2e2f0;
      font-size: 0.92rem;
      font-family: inherit;
      padding: 12px 16px;
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 48px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #555577; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    #sendBtn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      padding: 12px 20px;
      font-weight: 600;
      height: 48px;
    }
    #sendBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #clearBtn {
      background: transparent;
      color: #6666aa;
      padding: 6px 14px;
      font-size: 0.8rem;
      border: 1px solid #2d2d50;
    }
    #clearBtn:hover { color: #e2e2f0; border-color: #6366f1; }

    .hint { font-size: 0.75rem; color: #444466; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #10b981;
      color: #fff;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="title">
      <span>🦙</span>
      <div>
        <h1>LLaMA Chatbot</h1>
        <div class="subtitle">Powered by LangChain + Ollama</div>
      </div>
    </div>
    <div class="header-badge" id="modelBadge">llama3.2</div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="icon">💬</div>
      <h2>Start a conversation</h2>
      <p>Ask me anything — I'm here to help!</p>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Type a message… (Enter to send)"></textarea>
      <button id="sendBtn">Send ➤</button>
    </div>
    <div class="action-row">
      <button id="clearBtn">🗑 Clear Chat</button>
      <span class="hint">Shift+Enter for new line</span>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("userInput");
  const sendBtn    = document.getElementById("sendBtn");
  const clearBtn   = document.getElementById("clearBtn");
  const welcome    = document.getElementById("welcome");
  const toast      = document.getElementById("toast");

  // ── Chat history stored in browser ──
  let chatHistory = [];  // [{role: "user"|"bot", text: "..."}]

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = inputEl.scrollHeight + "px";
  });

  // Enter = send, Shift+Enter = newline
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);
  clearBtn.addEventListener("click", clearChat);

  function addMessage(text, role) {
    if (welcome) welcome.style.display = "none";

    const msg  = document.createElement("div");
    msg.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "🧑" : "🦙";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollBottom();
    return msg;
  }

  function addTyping() {
    const msg = document.createElement("div");
    msg.className = "message bot typing";
    msg.id = "typing";
    msg.innerHTML = `
      <div class="avatar">🦙</div>
      <div class="bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    messagesEl.appendChild(msg);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showToast(msg, color = "#10b981") {
    toast.textContent = msg;
    toast.style.background = color;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2500);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage(text, "user");
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history: chatHistory })
      });
      const data = await res.json();
      removeTyping();
      if (data.reply) {
        // Save to browser history
        chatHistory.push({ role: "user", text: text });
        chatHistory.push({ role: "bot",  text: data.reply });
        addMessage(data.reply, "bot");
      } else {
        addMessage("⚠️ Error: " + (data.error || "Unknown error"), "bot");
      }
    } catch (err) {
      removeTyping();
      addMessage("⚠️ Could not reach the server.", "bot");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    chatHistory = [];
    messagesEl.innerHTML = "";
    messagesEl.appendChild(welcome);
    welcome.style.display = "";
    showToast("✅ Conversation cleared");
  }
</script>
</body>
</html>
